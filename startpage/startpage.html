<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Start Page</title>
  <link rel="stylesheet" href="stylesheet.css">
  <meta name="color-scheme" content="light dark">
</head>
<body>

  <header>
    <button id="theme-toggle" aria-label="テーマ切替">🌙 / ☀️</button>
    <!-- 壁紙変更ボタン（header内とかに） -->
    <button id="bg-change" class="glass-btn">壁紙チェンジ</button>
    <!-- 名言表示エリア（自動で追加されるけど、位置調整したいなら） -->
    <div id="quote-area"></div>

    <!-- ToDoエリア（任意） -->
    <div style="margin-top: 2rem; text-align: left; max-width: 400px; margin-left: auto; margin-right: auto;">
      <input id="todo-input" placeholder="ToDo追加... (Enter)" style="width:100%; margin-bottom:0.8rem;">
      <ul id="todo-list" style="list-style:none; padding:0;"></ul>
    </div>
  </header>

  <main>
    <!-- <div class="days-passed" id="days">+ [計算中...]</div> -->
    <div class="days-passed"><p>+ 96日 交際終了</p>
    <h1>ようこそ</h1>
    <div class="time" id="clock">00:00:00</div>

    <div id="weather" class="weather-card">
      <div class="weather-loading">天気読み込み中...</div>
      <div class="weather-content" style="display: none;">
        <div class="current-temp"></div>
        <div class="current-condition"></div>
        <div class="feels-like"></div>
        <div class="details-grid"></div>
      </div>
    </div>
    
    <div class="search">
      <form id="search-form" method="get" action="https://www.google.com/search" target="_blank">
        <input type="search" name="q" placeholder="検索..." list="search-engines" id="search-input" autocomplete="off">
        <datalist id="search-engines">
          <option value="Google">Google</option>
          <option value="DuckDuckGo">DuckDuckGo</option>
          <option value="Yahoo! Japan">Yahoo! Japan</option>
          <option value="Ask.com">Ask.com</option>
        </datalist>
      </form>
    </div>
    
    <div class="links">
      <a href="https://grok.com" class="card">Grok</a>
      <a href="https://www.hs.reitaku.jp" class="card">麗澤中高HP</a>
      <a href="https://r25347sh.github.io/siyou-watakushiyou-/light_alarm/index.html" class="card">光アラーム</a>
      <a href="https://teams.live.com/v2/" class="card">Teams</a>
      <!-- ここに好きなリンクを追加 -->
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
